<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>自転車事故防止アプリ</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 800px; }

    #warning {
      display: none;
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: red;
      color: white;
      font-size: 30px;
      padding: 20px 40px;
      border-radius: 15px;
      z-index: 1000;
    }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,100% {opacity:1;}
      50% {opacity:0;}
    }

    #startBtn {
      font-size: 30px;
      padding: 40px 60px;
      border-radius: 15px;
      background: green;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<button id="startBtn" onclick="startApp()">スタート</button>
<button onclick="navigator.vibrate(1000)">テスト振動</button>

<h2>自転車事故防止アプリ</h2>

<div id="map"></div>
<div id="warning">⚠ 危険区域に入りました！</div>

<script>

// 🔥 振動制御
let vibrationInterval = null;

// 地図
const map = L.map('map').setView([35.6872027, 139.8208808], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  noWrap: true
}).addTo(map);

// 手動危険区域
const dangerZones = [
  { lat: 35.6872027, lon: 139.8208808, radius: 50 },
  { lat: 35.710063, lon: 139.8107, radius: 80 }
];

// CSV危険区域
const csvZones = [];

// 手動ゾーン描画
dangerZones.forEach(zone => {
  L.circle([zone.lat, zone.lon], {
    radius: zone.radius,
    color: 'red',
    fillOpacity: 0.3
  }).addTo(map);
});

// 🔥 CSV読み込み
fetch("honhyo_2024.csv")
  .then(res => res.text())
  .then(text => {
    const lines = text.split("\n").slice(1);

    lines.forEach(line => {
      const cols = line.split(",");

      // 🔥 10,000,000で割る
      const lat = parseFloat(cols[1]) / 10000000;
      const lon = parseFloat(cols[2]) / 10000000;

      if (!isNaN(lat) && !isNaN(lon)) {

        L.circle([lat, lon], {
          radius: 80,
          color: "orange",
          fillOpacity: 0.4
        }).addTo(map);

        csvZones.push({ lat: lat, lon: lon, radius: 80 });
      }
    });

    console.log("CSV読み込み完了:", csvZones.length);
  });

// ユーザー位置
let userMarker = L.marker([0,0]).addTo(map);
const warningDiv = document.getElementById("warning");

let insideZone = false;

// スタート
function startApp() {

  // ボタン消す
  document.getElementById("startBtn").style.display = "none";

  navigator.geolocation.watchPosition(pos => {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    userMarker.setLatLng([lat, lon]);
    map.setView([lat, lon]);

    let isInside = false;

    // 手動判定
    dangerZones.forEach(zone => {
      const d = map.distance([lat, lon], [zone.lat, zone.lon]);
      if (d < zone.radius) isInside = true;
    });

    // CSV判定
    csvZones.forEach(zone => {
      const d = map.distance([lat, lon], [zone.lat, zone.lon]);
      if (d < zone.radius) isInside = true;
    });

    console.log("危険:", isInside);

    // 🔥 危険区域内
    if (isInside) {

      warningDiv.style.display = "block";
      warningDiv.classList.add("blink");

      // 🔊 入った瞬間だけ音
      if (!insideZone) {
        const audio = new Audio("beep.mp3");
        audio.play();
      }

      // 📳 振動ループ
      if (!vibrationInterval && navigator.vibrate) {
        vibrationInterval = setInterval(() => {
          navigator.vibrate([300, 200]);
        }, 500);
      }

    }

    // 🔥 出たとき
    if (!isInside) {

      warningDiv.style.display = "none";
      warningDiv.classList.remove("blink");

      if (vibrationInterval) {
        clearInterval(vibrationInterval);
        navigator.vibrate(0);
        vibrationInterval = null;
      }
    }

    insideZone = isInside;

  }, err => {
    alert("位置情報エラー: " + err.message);
  });
}

</script>
</body>
</html>
