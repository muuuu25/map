<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>自転車事故防止アプリ</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 800px; }

    #warning {
      display: none;
      position: fixed;
      top: 10%;
      left: 50%;
      transform: translate(-50%, 10%);
      background: red;
      color: white;
      font-size: 36px;
      font-weight: bold;
      padding: 30px 60px;
      border-radius: 20px;
      text-align: center;
      z-index: 1000;
    }

    .blink {
      animation: blinkAnimation 1s infinite;
    }

    @keyframes blinkAnimation {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>

<body>

<button onclick="startApp()">スタート</button>

<h2>自転車事故防止アプリ</h2>
<div id="map"></div>
<div id="warning">⚠ 危険区域に入りました！</div>

<script>

// 地図
const map = L.map('map').setView([35.6872027, 139.8208808], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  noWrap: true
}).addTo(map);

// 危険区域（先に定義！）
const dangerZones = [
  { lat: 35.6872027, lon: 139.8208808, radius: 50 },
  { lat: 35.710063, lon: 139.8107, radius: 80 }
];

// 描画
dangerZones.forEach(zone => {
  L.circle([zone.lat, zone.lon], {
    radius: zone.radius,
    color: 'red',
    fillOpacity: 0.3
  }).addTo(map);
});

// ユーザー
let userMarker = L.marker([0,0]).addTo(map);
const warningDiv = document.getElementById('warning');
let insideZoneIndex = null;

// スタート
function startApp() {

  navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    userMarker.setLatLng([lat, lon]);
    map.setView([lat, lon]);

    let newInsideIndex = null;

    dangerZones.forEach((zone, index) => {
      const dist = map.distance([lat, lon], [zone.lat, zone.lon]);
      if (dist < zone.radius) {
        newInsideIndex = index;
      }
    });

    console.log("入った:", newInsideIndex);

    if (newInsideIndex !== null && newInsideIndex !== insideZoneIndex) {
      console.log("振動チェック");
      warningDiv.style.display = 'block';
      warningDiv.classList.add('blink');

      // 🔥 振動
      if (navigator.vibrate) {
        navigator.vibrate([300, 100, 300]);
      }
    }

    if (newInsideIndex === null) {
      warningDiv.style.display = 'none';
      warningDiv.classList.remove('blink');
    }

    insideZoneIndex = newInsideIndex;

  }, err => {
    alert("位置情報エラー: " + err.message);
  });

}

</script>
</body>
</html>
